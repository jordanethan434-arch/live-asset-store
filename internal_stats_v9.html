
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Intelligence Hub | PromptLogic AI</title>
        <style>
            :root { --bg: #0b0f1a; --card-bg: #161b2a; --accent: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
            body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
            .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; max-width: 1200px; margin: 0 auto 60px; }
            .brand { font-weight: 800; color: var(--accent); letter-spacing: 2px; }
            .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; max-width: 1200px; margin: 0 auto; }
            .stat-card { background: var(--card-bg); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
            .stat-value { font-size: 3rem; font-weight: 800; display: block; color: var(--accent); }
            .stat-label { color: var(--text-dim); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; margin-top: 8px; }
            .log { max-width: 1200px; margin: 60px auto 0; background: #000; padding: 20px; border-radius: 12px; font-family: monospace; font-size: 0.85rem; color: #22c55e; border: 1px solid #161b2a; }
        </style>
    </head>
    <body>
        <div class="nav">
            <div class="brand">PromptLogic AI INTERNAL</div>
            <div style="color: #64748b;">SYSTEM V4.0 ACTIVE</div>
        </div>

        <div class="grid">
            <div class="stat-card">
                <span class="stat-value">0</span>
                <span class="stat-label">Unique Prospects</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">0</span>
                <span class="stat-label">Intelligence Requests</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">40</span>
                <span class="stat-label">Active Protocols</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">42</span>
                <span class="stat-label">Live Deployments</span>
            </div>
        </div>

        <div class="log">
            > [2026-05-15 21:58:36] SYSTEM_SYNC_SUCCESSFUL<br>
            > [LATENCY] 14ms<br>
            > [STATUS] SEARCHING_FOR_HIGH_TICKET_LEADS...
        </div>
    </body>
    </html>
